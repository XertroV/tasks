name: Build Latest (master)

on:
  push:
    branches:
      - "master"
    paths:
      - "backlog_go/**"
      - ".github/workflows/ci-master-build.yml"

permissions:
  contents: write

env:
  GO_VERSION: "1.22"
  GO_PROJECT_DIR: "backlog_go"
  BINARY_NAME: "backlog"

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd ${{ env.GO_PROJECT_DIR }}
          VERSION="latest+${GITHUB_SHA::8}"
          go build -ldflags "-s -w -X github.com/XertroV/tasks/backlog_go/cmd.BuildVersion=${VERSION}" \
            -o "../${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}*

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelogs
        id: changelog
        run: |
          # Changelog since last version tag (for release notes)
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -n "$LATEST_TAG" ]; then
            SINCE_TAG_LOG=$(git log --pretty=format:"- %s (%h)" --no-merges "${LATEST_TAG}..HEAD")
            TAG_HEADER="Changes since last release (${LATEST_TAG})"
          else
            SINCE_TAG_LOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
            TAG_HEADER="All changes (no releases yet)"
          fi

          # Changelog since last build (last 10 commits or since previous push)
          SINCE_BUILD_LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)

          # Write combined changelog
          {
            echo "## Latest build from master"
            echo ""
            echo "Commit: \`${GITHUB_SHA::8}\`"
            echo "Built: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "---"
            echo ""
            echo "## ${TAG_HEADER}"
            echo ""
            echo "$SINCE_TAG_LOG"
            echo ""
            echo "---"
            echo ""
            echo "## Recent commits"
            echo ""
            echo "$SINCE_BUILD_LOG"
            echo ""
            echo "---"
            echo ""
            echo "### Downloads"
            echo ""
            echo "Pre-built binaries below for Linux/macOS/Windows (amd64 + arm64)."
            echo "These are development builds from master -- use version-tagged releases for production."
          } > changelog.md

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.md

  publish:
    name: Update latest pre-release
    needs: [build, changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete old latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the existing 'latest' release if it exists (keeps the tag)
          gh release delete latest --yes --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Create latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (master)"
          body_path: artifacts/changelog/changelog.md
          files: artifacts/backlog-*/*
          generate_release_notes: false
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
